replicaCount: 2

image:
  repository: changeme.azurecr.io/backend
  digest: "sha256:replace-me"
  pullPolicy: IfNotPresent

serviceAccount:
  create: true
  name: ""

service:
  port: 80
  targetPort: 7000

ingress:
  enabled: true
  className: nginx
  host: api-dev.boutique.example.com
  tls:
    enabled: true
    secretName: backend-dev-tls
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-prod

resources: {}

nodeSelector: {}

tolerations: []
