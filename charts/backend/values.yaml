replicaCount: 2

image:
  repository: changeme.azurecr.io/backend
  digest: "sha256:replace-me"
  pullPolicy: IfNotPresent

serviceAccount:
  create: true
  name: ""

service:
  port: 80
  # Must match apps/backend/Dockerfile (nginx listens on 8080).
  targetPort: 8080

ingress:
  enabled: true
  className: nginx
  host: api-dev.boutique.example.com
  tls:
    enabled: true
    secretName: backend-dev-tls
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-prod

resources: {}

livenessProbe: {}

readinessProbe: {}

podDisruptionBudget:
  enabled: false
  minAvailable: 1

nodeSelector: {}

tolerations: []

# Optional: must match a cluster PriorityClass (e.g. boutique-prod-critical in prod).
priorityClassName: ""
