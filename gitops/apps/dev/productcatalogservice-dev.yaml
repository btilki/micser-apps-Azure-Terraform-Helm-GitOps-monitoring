apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: productcatalogservice-dev
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    repoURL: https://github.com/btilki/microservices-cicd-on-azure-with-argocd-and-observability.git
    targetRevision: main
    path: charts/productcatalogservice
    helm:
      releaseName: productcatalogservice
      valueFiles:
        - ../../gitops/envs/dev/values-productcatalogservice.yaml
  destination:
    server: https://kubernetes.default.svc
    namespace: dev
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
