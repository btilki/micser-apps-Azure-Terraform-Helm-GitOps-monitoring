# DNS zone + RG: infra/terraform/envs/shared/main.tf (module "dns", azurerm_resource_group.shared).
# subscriptionID: from `az account show --query id -o tsv` (not stored in Terraform in this repo).
# managedIdentity.clientID: create a user-assigned MI, grant DNS Zone Contributor on the zone, federate
#   subject system:serviceaccount:cert-manager:cert-manager, annotate SA cert-manager with
#   azure.workload.identity/client-id — then paste that client ID here.
apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata:
  name: letsencrypt-prod
spec:
  acme:
    email: btilki@gmail.com
    server: https://acme-v02.api.letsencrypt.org/directory
    privateKeySecretRef:
      name: letsencrypt-prod-account-key
    solvers:
      - dns01:
          azureDNS:
            hostedZoneName: biroltilki.art
            resourceGroupName: rg-boutique-shared-weu
            subscriptionID: 6b047f8d-0c64-480b-85d3-21c09381cc3d
            environment: AzurePublicCloud
            managedIdentity:
              clientID: 8edf3025-3cb2-4d69-b9ef-01ecd53e1e91
