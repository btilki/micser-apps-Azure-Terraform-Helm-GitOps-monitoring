apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: frontend-prod
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: boutique-prod
  source:
    repoURL: https://github.com/btilki/microservices-cicd-on-azure-with-argocd-and-observability.git
    targetRevision: main
    path: charts/frontend
    helm:
      releaseName: frontend-prod
      valueFiles:
        - ../../gitops/envs/prod/values-frontend.yaml
  destination:
    server: https://kubernetes.default.svc
    namespace: prod
  syncPolicy:
    syncOptions:
      - CreateNamespace=true
