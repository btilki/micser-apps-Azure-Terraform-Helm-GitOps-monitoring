apiVersion: argoproj.io/v1alpha1
kind: AppProject
metadata:
  name: boutique-prod
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "-1"
spec:
  description: Production environment project for boutique services
  sourceRepos:
    - https://github.com/btilki/micser-apps-Azure-Terraform-Helm-GitOps-monitoring.git
  destinations:
    - server: https://kubernetes.default.svc
      namespace: prod
  # Allow only the cluster-scoped kinds this repo needs for prod platform setup.
  clusterResourceWhitelist:
    - group: ""
      kind: Namespace
    - group: scheduling.k8s.io
      kind: PriorityClass
  # Deny-list dangerous cluster-scoped resources by default.
  clusterResourceBlacklist:
    - group: rbac.authorization.k8s.io
      kind: ClusterRole
    - group: rbac.authorization.k8s.io
      kind: ClusterRoleBinding
    - group: admissionregistration.k8s.io
      kind: MutatingWebhookConfiguration
    - group: admissionregistration.k8s.io
      kind: ValidatingWebhookConfiguration
    - group: apiextensions.k8s.io
      kind: CustomResourceDefinition
  namespaceResourceWhitelist:
    - group: '*'
      kind: '*'
