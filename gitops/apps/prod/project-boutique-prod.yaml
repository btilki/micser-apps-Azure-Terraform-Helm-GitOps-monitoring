apiVersion: argoproj.io/v1alpha1
kind: AppProject
metadata:
  name: boutique-prod
  namespace: argocd
spec:
  description: Production environment project for boutique services
  sourceRepos:
    - https://github.com/btilki/microservices-cicd-on-azure-with-argocd-and-observability.git
  destinations:
    - server: https://kubernetes.default.svc
      namespace: prod
  clusterResourceWhitelist:
    - group: '*'
      kind: '*'
  namespaceResourceWhitelist:
    - group: '*'
      kind: '*'
