apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: shippingservice-stage
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: boutique-stage
  source:
    repoURL: https://github.com/btilki/microservices-cicd-on-azure-with-argocd-and-observability.git
    targetRevision: main
    path: charts/shippingservice
    helm:
      releaseName: shippingservice
      valueFiles:
        - ../../gitops/envs/stage/values-shippingservice.yaml
  destination:
    server: https://kubernetes.default.svc
    namespace: stage
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
