image:
  repository: acrboutiqueprodweu.azurecr.io/backend
  digest: "sha256:801af4513ac121bfbd2da16ce4412d9800fd69ce13d7a0b35363b4e2f9dc97be"

replicaCount: 3

resources:
  requests:
    cpu: 150m
    memory: 192Mi
  limits:
    cpu: "1"
    memory: 768Mi

livenessProbe:
  httpGet:
    path: /
    port: http
  initialDelaySeconds: 20
  periodSeconds: 15
  timeoutSeconds: 3
  failureThreshold: 3

readinessProbe:
  httpGet:
    path: /
    port: http
  initialDelaySeconds: 10
  periodSeconds: 10
  timeoutSeconds: 2
  failureThreshold: 3

podDisruptionBudget:
  enabled: true
  minAvailable: 2

ingress:
  className: nginx
  host: api.boutique.biroltilki.art
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-prod
  tls:
    secretName: backend-prod-tls

nodeSelector:
  kubernetes.azure.com/mode: user

tolerations: []

priorityClassName: boutique-prod-critical
