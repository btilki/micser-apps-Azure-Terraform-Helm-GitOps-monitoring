image:
  repository: acrboutiqueprodweu.azurecr.io/frontend
  digest: "sha256:c9d8927c1b646afe71888dfea9ba57bf4fbf53e2a273e8817d3d53529346c513"

googleDemo:
  enabled: false
  externalName: frontend.google-boutique.svc.cluster.local

replicaCount: 3

resources:
  requests:
    cpu: 150m
    memory: 192Mi
  limits:
    cpu: "1"
    memory: 768Mi

livenessProbe:
  httpGet:
    path: /
    port: http
  initialDelaySeconds: 20
  periodSeconds: 15
  timeoutSeconds: 3
  failureThreshold: 3

readinessProbe:
  httpGet:
    path: /
    port: http
  initialDelaySeconds: 10
  periodSeconds: 10
  timeoutSeconds: 2
  failureThreshold: 3

podDisruptionBudget:
  enabled: true
  minAvailable: 2

ingress:
  className: nginx
  host: boutique.biroltilki.art
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-prod
  tls:
    secretName: frontend-prod-tls

nodeSelector:
  kubernetes.azure.com/mode: user

tolerations: []

priorityClassName: boutique-prod-critical
