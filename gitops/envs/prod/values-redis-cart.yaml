image:
  repository: acrboutiqueprodweu.azurecr.io/redis-cart
  digest: "sha256:f337cad04ce49504acde20d4286a29e28d595b7fa61d16c0afac0a5190e4ebd1"

replicaCount: 2

resources:
  requests:
    cpu: 150m
    memory: 192Mi
  limits:
    cpu: 750m
    memory: 640Mi

livenessProbe:
  tcpSocket:
    port: http
  initialDelaySeconds: 15
  periodSeconds: 10
  timeoutSeconds: 2
  failureThreshold: 3

readinessProbe:
  tcpSocket:
    port: http
  initialDelaySeconds: 5
  periodSeconds: 5
  timeoutSeconds: 2
  failureThreshold: 3

podDisruptionBudget:
  enabled: true
  minAvailable: 1

service:
  port: 6379
  targetPort: 6379

nodeSelector:
  kubernetes.azure.com/mode: user

tolerations: []

priorityClassName: boutique-prod-critical
