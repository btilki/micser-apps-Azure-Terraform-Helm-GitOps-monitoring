image:
  repository: acrboutiquestageweu.azurecr.io/redis-cart
  digest: "sha256:REPLACE_WITH_STAGE_DIGEST"

replicaCount: 1

resources:
  requests:
    cpu: 100m
    memory: 128Mi
  limits:
    cpu: 300m
    memory: 384Mi

service:
  port: 6379
  targetPort: 6379

nodeSelector:
  kubernetes.azure.com/mode: user

tolerations:
  - key: env
    operator: Equal
    value: stage
    effect: NoSchedule
