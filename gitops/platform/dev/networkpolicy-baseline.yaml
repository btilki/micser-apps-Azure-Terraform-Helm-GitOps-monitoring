# Default ingress posture for dev: only traffic from pods in this namespace
# and from the nginx ingress controller namespace. Egress is unchanged (allowed).
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: dev-baseline-ingress
  namespace: dev
spec:
  podSelector: {}
  policyTypes:
    - Ingress
  ingress:
    - from:
        - podSelector: {}
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: ingress-nginx
