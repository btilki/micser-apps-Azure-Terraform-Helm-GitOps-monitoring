# Ingress: same namespace, ingress-nginx (public entry), and monitoring scrapes.
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: dev-baseline-ingress
  namespace: dev
spec:
  podSelector: {}
  policyTypes:
    - Ingress
  ingress:
    - from:
        - podSelector: {}
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: ingress-nginx
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: monitoring
