# Default deny for all pods in dev. Allowed traffic is unioned with other
# NetworkPolicies in this directory (baseline ingress + egress core).
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: dev-default-deny-all
  namespace: dev
spec:
  podSelector: {}
  policyTypes:
    - Ingress
    - Egress
