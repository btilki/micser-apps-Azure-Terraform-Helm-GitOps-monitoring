# Explicit egress: cluster DNS (kube-system), intra-namespace, HTTPS to external
# endpoints (e.g. Azure API, public HTTP APIs), and kube-system control-plane paths.
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: dev-egress-core
  namespace: dev
spec:
  podSelector: {}
  policyTypes:
    - Egress
  egress:
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: kube-system
      ports:
        - protocol: UDP
          port: 53
        - protocol: TCP
          port: 53
        - protocol: TCP
          port: 443
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: dev
    - to:
        - ipBlock:
            cidr: 0.0.0.0/0
      ports:
        - protocol: TCP
          port: 443
