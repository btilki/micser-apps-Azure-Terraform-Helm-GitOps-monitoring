# Key Vault CSI v1 — frontend dev (optional until sample secret + clientID are set).
# 1. terraform apply dev → note frontend_workload_identity_client_id
# 2. az keyvault secret set --vault-name kv-boutique-dev-weu --name boutique-sample --value "hello"
# 3. Replace YOUR_TENANT_ID and YOUR_DEV_FRONTEND_UAMI_CLIENT_ID below, then enable chart keyVault in values-frontend.yaml
apiVersion: secrets-store.csi.x-k8s.io/v1
kind: SecretProviderClass
metadata:
  name: boutique-dev-frontend-kv
  namespace: dev
spec:
  provider: azure
  parameters:
    usePodIdentity: "false"
    useVMManagedIdentity: "false"
    clientID: "YOUR_DEV_FRONTEND_UAMI_CLIENT_ID"
    keyvaultName: kv-boutique-dev-weu
    tenantId: "YOUR_TENANT_ID"
    objects: |
      array:
        - |
          objectName: boutique-sample
          objectType: secret
  secretObjects:
    - secretName: boutique-sample-k8s
      type: Opaque
      data:
        - objectName: boutique-sample
          key: sample-value
