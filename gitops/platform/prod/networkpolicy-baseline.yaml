# Ingress: same namespace, ingress-nginx, and monitoring scrapes.
# Same pattern as gitops/platform/stage and dev (per-environment namespace).
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: prod-baseline-ingress
  namespace: prod
spec:
  podSelector: {}
  policyTypes:
    - Ingress
  ingress:
    - from:
        - podSelector: {}
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: ingress-nginx
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: monitoring
