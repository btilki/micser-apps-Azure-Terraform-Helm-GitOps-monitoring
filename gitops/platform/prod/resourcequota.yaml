apiVersion: v1
kind: ResourceQuota
metadata:
  name: prod-compute-quota
  namespace: prod
spec:
  hard:
    pods: "40"
    services: "25"
    configmaps: "60"
    secrets: "60"
    persistentvolumeclaims: "20"
    requests.cpu: "8"
    requests.memory: 16Gi
    limits.cpu: "16"
    limits.memory: 32Gi
