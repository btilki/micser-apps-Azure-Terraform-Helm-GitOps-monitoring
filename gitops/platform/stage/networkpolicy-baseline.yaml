# Ingress: same namespace, ingress-nginx, and monitoring scrapes.
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: stage-baseline-ingress
  namespace: stage
spec:
  podSelector: {}
  policyTypes:
    - Ingress
  ingress:
    - from:
        - podSelector: {}
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: ingress-nginx
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: monitoring
