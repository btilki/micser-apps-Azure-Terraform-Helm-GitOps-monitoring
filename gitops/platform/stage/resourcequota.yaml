apiVersion: v1
kind: ResourceQuota
metadata:
  name: stage-compute-quota
  namespace: stage
spec:
  hard:
    pods: "30"
    services: "20"
    configmaps: "40"
    secrets: "40"
    persistentvolumeclaims: "10"
    requests.cpu: "4"
    requests.memory: 8Gi
    limits.cpu: "8"
    limits.memory: 16Gi
