# Push/PR triggers off: run manually in Azure DevOps. Re-enable when CI-on-commit is desired.
trigger: none
pr: none

pool:
  vmImage: ubuntu-latest

variables:
  SERVICE_NAME: currencyservice
  DEV_ACR_NAME: acrboutiquedevweu
  DEV_ACR_LOGIN_SERVER: acrboutiquedevweu.azurecr.io
  IMAGE_REPOSITORY: currencyservice
  GITOPS_VALUES_FILE: gitops/envs/dev/values-currencyservice.yaml
  AZURE_SUBSCRIPTION_CONNECTION: promotion-azure-connection
  GITHUB_REPOSITORY: btilki/micser-apps-Azure-Terraform-Helm-GitOps-monitoring

stages:
  - stage: BuildScanPush
    displayName: Build, scan, and push image
    jobs:
      - job: BuildAndPush
        variables:
          - group: 'variable-group-for-microservices'
        steps:
          - checkout: self
            persistCredentials: true

          - script: |
              set -euo pipefail
              echo "Add currencyservice lint/test commands here."
            displayName: Run lint/tests (placeholder)

          - task: AzureCLI@2
            displayName: Build and push image
            inputs:
              azureSubscription: $(AZURE_SUBSCRIPTION_CONNECTION)
              scriptType: bash
              scriptLocation: inlineScript
              inlineScript: |
                set -euo pipefail
                az acr login --name "$(DEV_ACR_NAME)"
                docker build -f apps/currencyservice/Dockerfile -t "$(DEV_ACR_LOGIN_SERVER)/$(IMAGE_REPOSITORY):$(Build.SourceVersion)" .
                docker push "$(DEV_ACR_LOGIN_SERVER)/$(IMAGE_REPOSITORY):$(Build.SourceVersion)"

          - task: AzureCLI@2
            displayName: Resolve pushed image digest
            name: ResolveDigest
            inputs:
              azureSubscription: $(AZURE_SUBSCRIPTION_CONNECTION)
              scriptType: bash
              scriptLocation: inlineScript
              inlineScript: |
                set -euo pipefail
                IMAGE_REF="$(DEV_ACR_LOGIN_SERVER)/$(IMAGE_REPOSITORY):$(Build.SourceVersion)"
                DIGEST="$(az acr repository show-manifests --name $(DEV_ACR_NAME) --repository $(IMAGE_REPOSITORY) --query "[?contains(tags, '$(Build.SourceVersion)')].digest | [0]" -o tsv)"
                if [ -z "$DIGEST" ]; then
                  echo "Digest not found for $IMAGE_REF"
                  exit 1
                fi
                echo "Resolved digest: $DIGEST"
                echo "##vso[task.setvariable variable=IMAGE_DIGEST;isOutput=true]$DIGEST"

          - task: AzureCLI@2
            displayName: Trivy scan
            inputs:
              azureSubscription: $(AZURE_SUBSCRIPTION_CONNECTION)
              scriptType: bash
              scriptLocation: inlineScript
              inlineScript: |
                set -euo pipefail
                IMAGE_REF="$(DEV_ACR_LOGIN_SERVER)/$(IMAGE_REPOSITORY)@$(ResolveDigest.IMAGE_DIGEST)"
                ACR_TOKEN="$(az acr login --name $(DEV_ACR_NAME) --expose-token --query accessToken -o tsv)"

                docker run --rm \
                  -e TRIVY_USERNAME=00000000-0000-0000-0000-000000000000 \
                  -e TRIVY_PASSWORD="$ACR_TOKEN" \
                  aquasec/trivy:0.53.0 image \
                  --scanners vuln \
                  --severity HIGH,CRITICAL \
                  --exit-code 1 \
                  --ignore-unfixed \
                  "$IMAGE_REF"

          - script: |
              set -euo pipefail
              python3 - <<'PY'
              import re
              from pathlib import Path

              path = Path("$(GITOPS_VALUES_FILE)")
              content = path.read_text()
              new = "$(ResolveDigest.IMAGE_DIGEST)"
              updated = re.sub(
                  r'digest:\s*"?([^"\n]+)"?',
                  f'digest: "{new}"',
                  content,
                  count=1
              )
              if updated == content:
                  raise SystemExit("Unable to locate digest field in values file.")
              path.write_text(updated)
              print(f"Updated {path} with digest {new}")
              PY
            displayName: Update GitOps values digest

          - script: |
              set -euo pipefail
              if git diff --quiet -- "$(GITOPS_VALUES_FILE)"; then
                echo "Digest is unchanged. Skipping branch push and PR creation."
                exit 0
              fi
              BRANCH="ci/currencyservice-digest-$(Build.BuildId)"
              git checkout -b "$BRANCH"
              git add "$(GITOPS_VALUES_FILE)"
              git -c user.name="azure-pipelines[bot]" -c user.email="azure-pipelines[bot]@users.noreply.github.com" \
                commit -m "chore(currencyservice): update dev image digest"
              git push origin "$BRANCH"

              PAYLOAD="$(cat <<EOF
              {
                "title": "chore(currencyservice): update dev image digest",
                "head": "$BRANCH",
                "base": "main",
                "body": "Automated digest update for currencyservice image: $(ResolveDigest.IMAGE_DIGEST)"
              }
              EOF
              )"

              RESPONSE="$(curl -sS -X POST \
                -H "Accept: application/vnd.github+json" \
                -H "Authorization: Bearer $GITHUB_TOKEN" \
                https://api.github.com/repos/$(GITHUB_REPOSITORY)/pulls \
                -d "$PAYLOAD")"

              PR_URL="$(RESPONSE_JSON="$RESPONSE" python3 - <<'PY'
              import json, os
              data = json.loads(os.environ["RESPONSE_JSON"])
              print(data.get("html_url", ""))
              PY
              )"

              if [ -z "$PR_URL" ]; then
                echo "Failed to create PR. API response:"
                echo "$RESPONSE"
                exit 1
              fi

              echo "Created PR: $PR_URL"
            displayName: Push branch and open GitOps PR
            env:
              GITHUB_TOKEN: $(GITHUB_TOKEN)
