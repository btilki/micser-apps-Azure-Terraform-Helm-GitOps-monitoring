trigger: none
pr: none

pool:
  vmImage: ubuntu-latest

variables:
  - group: 'variable-group-for-microservices'

parameters:
  - name: digest
    displayName: "Digest to promote (optional, ex: sha256:abcd...)"
    type: string
    default: ''

extends:
  template: ../templates/promote-image.yml
  parameters:
    stageName: PromoteBackendToProd
    stageDisplayName: Promote backend image from stage to prod
    deploymentName: PromoteBackendProd
    deploymentDisplayName: Import backend and create prod GitOps PR
    environmentName: promote-prod
    imageName: backend
    sourceAcrLoginServer: acrboutiquestageweu.azurecr.io
    targetAcrName: acrboutiqueprodweu
    targetAcrLoginServer: acrboutiqueprodweu.azurecr.io
    sourceValuesFile: gitops/envs/stage/values-backend.yaml
    targetValuesFile: gitops/envs/prod/values-backend.yaml
    githubRepository: btilki/microservices-cicd-on-azure-with-argocd-and-observability
    azureSubscriptionConnection: promotion-azure-connection
    promotionLabel: prod
    requiredSourceAcrRoles: AcrPull
    requiredTargetAcrRoles: AcrPush
    requiredReaderResourceGroups: rg-boutique-stage-weu,rg-boutique-prod-weu
    digest: ${{ parameters.digest }}
